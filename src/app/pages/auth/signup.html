<main class="auth-page">
  <a routerLink="/login" class="back">← Volver al login</a>
  <section class="auth-card">
    <div class="auth-copy"><app-brand-heart class="logo" aria-hidden="true" /><span class="eyebrow">Registro protegido</span><h1>Nueva cuenta administrativa</h1><p>La cuenta se almacenará en MySQL con la contraseña cifrada.</p><div class="demo"><strong>Código privado requerido</strong><span>Solicita el código a la persona responsable de la plataforma.</span></div></div>
    <form (ngSubmit)="submit()"><div class="field"><label for="name">Nombre completo</label><input id="name" name="name" [(ngModel)]="name" placeholder="Nombre del administrador" autocomplete="name" required></div><div class="field"><label for="email">Correo electrónico</label><input id="email" type="email" name="email" [(ngModel)]="email" placeholder="correo@fundacion.org" autocomplete="email" required></div><div class="field"><label for="password">Contraseña</label><input id="password" type="password" name="password" [(ngModel)]="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required></div><div class="field"><label for="confirmation">Confirmar contraseña</label><input id="confirmation" type="password" name="passwordConfirmation" [(ngModel)]="passwordConfirmation" placeholder="Repite la contraseña" autocomplete="new-password" required></div><div class="field"><label for="signup-code">Código de registro</label><input id="signup-code" type="password" name="signupCode" [(ngModel)]="signupCode" placeholder="Código administrativo privado" autocomplete="off" required></div>@if(error()){<p class="error">{{error()}}</p>}<button class="btn btn-primary" type="submit" [disabled]="loading()">{{loading() ? 'Creando cuenta…' : 'Crear cuenta administrativa'}}</button><p class="switch">¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p></form>
  </section>
</main>
